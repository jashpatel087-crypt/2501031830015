<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Quiz Admin | Matrix Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            max-height: 100vh;
            padding: 20px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .table-glass {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .table-glass th {
            color: var(--cyan);
            font-family: 'Orbitron';
        }
    </style>
</head>

<body class="vr-universe admin-page">
    <div class="hud-scanlines"></div>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="admin-sidebar p-4 d-flex flex-column">
            <h3 class="text-cyan orbitron mb-5">MATRIX_ADM</h3>
            <ul class="nav flex-column gap-3">
                <li class="nav-item">
                    <a href="admin.html" class="nav-link text-white glass-panel p-2">DASHBOARD</a>
                </li>
                <li class="nav-item">
                    <a href="admin_edit.html" class="nav-link text-white-50 p-2">EDIT QUESTIONS</a>
                </li>
                <li class="nav-item mt-auto">
                    <a href="index.html" class="btn btn-outline-magenta w-100 orbitron">EXIT MATRIX</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="orbitron text-white">SYSTEM OVERVIEW</h2>
                <div class="text-end">
                    <small class="text-white-50 d-block">ADMIN_SESSION_ACTIVE</small>
                    <span class="text-cyan small">AUTH_LEVEL: OMEGA</span>
                </div>
            </header>

            <div class="row g-4 mb-5">
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-white-50">TOTAL_SYNCERS</small>
                        <h2 class="text-cyan orbitron mt-2">1,204</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-white-50">AVG_INTEGRITY</small>
                        <h2 class="text-magenta orbitron mt-2">84%</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-white-50">ACTIVE_NODES</small>
                        <h2 class="text-cyan orbitron mt-2">15</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <small class="text-white-50">UPTIME</small>
                        <h2 class="text-white orbitron mt-2">99.9%</h2>
                    </div>
                </div>
            </div>

            <!-- Logs sector removed -->
        </div>
    </div>
</body>

</html>
