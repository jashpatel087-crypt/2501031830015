<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR History Quiz | Complete Timeline Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="vr-universe">

    <!-- Background Overlay for HUD feel -->
    <div class="hud-scanlines"></div>
    <div class="hud-vignette"></div>

    <div id="game-container" class="container py-0 min-vh-100">

        <!-- Boot Screen -->
        <div id="boot-screen"
            class="game-view text-center d-flex flex-column align-items-center justify-content-center min-vh-100">
            <div class="boot-logo mb-4">
                <h1 class="display-3 fw-bold text-cyan glitch" data-text="VR_HISTORY">VR_HISTORY</h1>
                <p class="text-white-50 letter-spacing-wide">UNIFIED TEMPORAL MATRIX</p>
            </div>
            <div class="boot-progress mb-4 w-50">
                <div class="progress bg-dark" style="height: 10px;">
                    <div id="boot-bar" class="progress-bar bg-cyan" role="progressbar" style="width: 0%"></div>
                </div>
                <small class="text-cyan mt-2 d-block" id="boot-status">Loading Matrix...</small>
            </div>
            <button id="start-btn" class="btn btn-outline-cyan btn-lg px-5 d-none">INITIALIZE FULL MATRIX</button>
        </div>

        <!-- Unified Quiz List Screen -->
        <div id="quiz-screen" class="game-view d-none">
            <div class="hud-top-bar glass-panel p-3 d-flex justify-content-between align-items-center mb-5 sticky-top">
                <div class="hud-stat">
                    <span class="label">TIMELINE STATUS:</span>
                    <span class="value text-cyan">ALL NODES ACTIVE</span>
                </div>
                <div class="hud-stat text-end">
                    <span class="label">DATA INTEGRITY:</span>
                    <span id="score-val" class="value text-magenta">READY</span>
                </div>
            </div>

            <!-- Questions Container (Grid - No Scrolling) -->
            <div id="all-questions-list" class="row g-3">
                <!-- Questions injected here in a 3-column grid -->
            </div>

            <div class="text-center mt-4">
                <button id="submit-quiz-btn" class="btn btn-outline-magenta btn-sm px-5 py-2 orbitron">FINALIZE
                    SYNCHRONIZATION</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen"
            class="game-view d-none text-center d-flex flex-column align-items-center justify-content-center min-vh-100">
            <div class="result-box glass-panel p-5">
                <h2 id="result-title" class="text-cyan mb-3">CHRONOLOGY RESTORED</h2>
                <div class="result-stats mb-4">
                    <div class="stat-circle mx-auto mb-3">
                        <span id="final-score">0%</span>
                    </div>
                    <p id="result-text" class="text-white-50">Timeline stabilized across all eras.</p>
                </div>
                <div class="d-flex gap-3 justify-content-center">
                    <button id="restart-btn" class="btn btn-outline-cyan px-4">RE-SYNC FULL TIMELINE</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
