<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Quiz | Node Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            max-height: 100vh;
            padding: 20px;
        }

        .node-edit-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-control-matrix {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-size: 0.9rem;
        }

        .form-control-matrix:focus {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--cyan);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        label {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--cyan);
            margin-bottom: 5px;
        }
    </style>
</head>

<body class="vr-universe admin-page">
    <div class="hud-scanlines"></div>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="admin-sidebar p-4 d-flex flex-column">
            <h3 class="text-cyan orbitron mb-5">MATRIX_ADM</h3>
            <ul class="nav flex-column gap-3">
                <li class="nav-item">
                    <a href="admin.html" class="nav-link text-white-50 p-2">DASHBOARD</a>
                </li>
                <li class="nav-item">
                    <a href="admin_edit.html" class="nav-link text-white glass-panel p-2">EDIT QUESTIONS</a>
                </li>
                <li class="nav-item mt-auto">
                    <a href="index.html" class="btn btn-outline-magenta w-100 orbitron">EXIT MATRIX</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="orbitron text-white">CHRONO_NODE_EDITOR</h2>
                <div class="d-flex gap-3">
                    <button class="btn btn-outline-cyan orbitron btn-sm" onclick="saveToMemory()">PUSH_CHANGES</button>
                    <button class="btn btn-outline-magenta orbitron btn-sm" onclick="resetForm()">RESET_FLUX</button>
                </div>
            </header>

            <div id="questions-container" class="row">
                <!-- Question cards will be injected here -->
            </div>

            <div class="text-center py-5">
                <button class="btn btn-cyan px-5 orbitron" onclick="exportData()">EXPORT_CODE_STRING</button>
                <p class="text-white-50 mt-3 small">Manual synchronization required after export.</p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Data from script.js (Simplified for UI load)
        const initialQuestions = [
            { question: "Which pharaoh's tomb was discovered nearly intact in 1922?", options: ["Ramses II", "Tutankhamun", "Akhenaten", "Thutmose III"], correct: 1 },
            { question: "What was the primary purpose of the Great Pyramids of Giza?", options: ["Grain Storage", "Royal Palaces", "Royal Tombs", "Astronomical Observatories"], correct: 2 },
            { question: "Which process was used to preserve bodies in Ancient Egypt?", options: ["Mummification", "Crystallization", "Embalming", "Taxidermy"], correct: 0 },
            { question: "Who was the last active ruler of the Ptolemaic Kingdom of Egypt?", options: ["Nefertiti", "Cleopatra VII", "Hatshepsut", "Isis"], correct: 1 },
            { question: "What form of writing used picture symbols in Ancient Egypt?", options: ["Cuneiform", "Linear B", "Hieroglyphics", "Demotic"], correct: 2 },
            { question: "The 'Black Death' pandemic was primarily caused by which bacteria?", options: ["Yersinia pestis", "Salmonella", "E. coli", "Variola virus"], correct: 0 },
            { question: "Which agreement signed in 1215 limited the power of the English King?", options: ["Bill of Rights", "Magna Carta", "Treaty of Versailles", "Declaration of Arbroath"], correct: 1 },
            { question: "What was the code of conduct followed by knights called?", options: ["The Knight's Law", "Bushido", "Chivalry", "The Iron Rule"], correct: 2 },
            { question: "Who was the French heroine who led troops during the Hundred Years' War?", options: ["Eleanor of Aquitaine", "Joan of Arc", "Catherine de' Medici", "Marie Antoinette"], correct: 1 },
            { question: "Which city was the capital of the Byzantine Empire?", options: ["Rome", "Alexandria", "Constantinople", "Athens"], correct: 2 },
            { question: "Who is credited with inventing the first practical steam engine?", options: ["James Watt", "Thomas Edison", "Isaac Newton", "Alexander Graham Bell"], correct: 0 },
            { question: "In which country did the Industrial Revolution begin?", options: ["France", "USA", "Germany", "Great Britain"], correct: 3 },
            { question: "The 'Spinning Jenny' was an invention in which industry?", options: ["Coal Mining", "Textiles", "Transportation", "Agriculture"], correct: 1 },
            { question: "What was the main source of power during the early Industrial Revolution?", options: ["Electricity", "Oil", "Coal/Steam", "Natural Gas"], correct: 2 },
            { question: "What term describes the mass movement of people from rural areas to cities?", options: ["Suburbanization", "Migration", "Urbanization", "Colonization"], correct: 2 }
        ];

        function renderEditor() {
            const container = $('#questions-container');
            container.empty();

            initialQuestions.forEach((q, idx) => {
                container.append(`
                    <div class="col-lg-6">
                        <div class="node-edit-card p-4">
                            <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
                                <span class="text-cyan orbitron">NODE_${idx + 1}</span>
                                <span class="text-white-50 small">SECTOR: ${idx < 5 ? 'ANCIENT' : (idx < 10 ? 'MEDIEVAL' : 'INDUSTRIAL')}</span>
                            </div>
                            <div class="mb-3">
                                <label>QUESTION_STRING</label>
                                <textarea class="form-control form-control-matrix" rows="2">${q.question}</textarea>
                            </div>
                            <div class="row g-2">
                                ${q.options.map((opt, oIdx) => `
                                    <div class="col-6">
                                        <label>OPT_${oIdx + 1} ${oIdx === q.correct ? '<span class="text-magenta">[CORRECT]</span>' : ''}</label>
                                        <input type="text" class="form-control form-control-matrix" value="${opt}">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-3">
                                <label>CORRECT_INDEX (0-3)</label>
                                <input type="number" class="form-control form-control-matrix w-25" value="${q.correct}" min="0" max="3">
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        function exportData() {
            const finalData = [];
            $('.node-edit-card').each(function () {
                const q = $(this).find('textarea').val();
                const opts = [];
                $(this).find('input[type="text"]').each(function () {
                    opts.push($(this).val());
                });
                const corr = parseInt($(this).find('input[type="number"]').val());
                finalData.push({ question: q, options: opts, correct: corr });
            });

            const jsonString = JSON.stringify(finalData, null, 4);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "master_sync_data.json";
            a.click();
            alert("MATRIX EXPORTED! Copy this data into script.js 'allQuestions' array to apply changes permanently.");
        }

        $(document).ready(renderEditor);
    </script>
</body>

</html>
