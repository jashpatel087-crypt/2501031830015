<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Quiz | Add Node</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            max-height: 100vh;
            padding: 20px;
        }

        .node-form-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-control-matrix {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .form-control-matrix:focus {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--cyan);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        label {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: var(--cyan);
            margin-bottom: 8px;
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body class="vr-universe admin-page">
    <div class="hud-scanlines"></div>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="admin-sidebar p-4 d-flex flex-column">
            <h3 class="text-cyan orbitron mb-5">MATRIX_ADM</h3>
            <ul class="nav flex-column gap-3">
                <li class="nav-item">
                    <a href="admin.html" class="nav-link text-white-50 p-2">DASHBOARD</a>
                </li>
                <li class="nav-item">
                    <a href="admin_edit.html" class="nav-link text-white-50 p-2">EDIT QUESTIONS</a>
                </li>
                <li class="nav-item">
                    <a href="admin_add.html" class="nav-link text-white glass-panel p-2">ADD QUESTION</a>
                </li>
                <li class="nav-item mt-auto">
                    <a href="index.html" class="btn btn-outline-magenta w-100 orbitron">EXIT MATRIX</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="orbitron text-white">GENERATE_NEW_NODE</h2>
                <a href="admin_edit.html" class="btn btn-outline-white btn-sm orbitron">BACK_TO_ARCHIVE</a>
            </header>

            <div class="node-form-card">
                <div class="text-center mb-4">
                    <span class="badge bg-cyan text-dark orbitron px-3 py-2">NEW_CHRONO_DATA_STREAM</span>
                </div>

                <form id="add-node-form">
                    <div class="mb-3">
                        <label>QUESTION_STRING</label>
                        <textarea class="form-control form-control-matrix" rows="3"
                            placeholder="Enter the temporal query here..." required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>OPTION_1</label>
                            <input type="text" class="form-control form-control-matrix"
                                placeholder="First potential reality..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>OPTION_2</label>
                            <input type="text" class="form-control form-control-matrix"
                                placeholder="Second potential reality..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>OPTION_3</label>
                            <input type="text" class="form-control form-control-matrix"
                                placeholder="Third potential reality..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>OPTION_4</label>
                            <input type="text" class="form-control form-control-matrix"
                                placeholder="Fourth potential reality..." required>
                        </div>
                    </div>

                    <div class="row align-items-center mt-4">
                        <div class="col-md-4">
                            <label>CORRECT_INDEX (0-3)</label>
                            <select class="form-select form-control-matrix">
                                <option value="0">OPTION_1</option>
                                <option value="1">OPTION_2</option>
                                <option value="2">OPTION_3</option>
                                <option value="3">OPTION_4</option>
                            </select>
                        </div>
                        <div class="col-md-8 pt-4">
                            <p class="text-white-50 small m-0 fst-italic">Note: New nodes are temporarily stored in
                                browser cache unless exported to script.js</p>
                        </div>
                    </div>

                    <div class="mt-5 d-flex gap-3">
                        <button type="submit"
                            class="btn btn-cyan orbitron flex-grow-1 py-3">INJECT_NODE_INTO_MATRIX</button>
                        <button type="reset" class="btn btn-outline-magenta orbitron px-4">PURGE_FLUX</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('#add-node-form').on('submit', function (e) {
            e.preventDefault();

            // Simulation of adding
            const btn = $(this).find('button[type="submit"]');
            const originalText = btn.text();

            btn.text('INITIALIZING_INJECTION...').attr('disabled', true);

            setTimeout(() => {
                btn.text('STABILIZING_SYNC...').css('background', 'var(--magenta)');

                setTimeout(() => {
                    alert('NODE_INJECTED_SUCCESSFULLY! Redirecting to Archive Editor.');
                    window.location.href = 'admin_edit.html';
                }, 1000);
            }, 1000);
        });
    </script>
</body>

</html>
